<ion-header>
  <ion-toolbar>
    <ion-title>¡Bienvenido!</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div style="text-align:center; margin-top: 20px;">
    <h1 style="font-size:2rem;">🎮 GameSurvey App</h1>
    <p style="font-size:1.1rem; color:var(--ion-color-medium);">
      La app para descubrir los videojuegos favoritos del campus
    </p>
  </div>

  <ion-card>
    <ion-card-content>
      <p style="font-size:1rem; text-align:center;">
        Estamos probando una app de videojuegos desarrollada en Ionic.
        <strong>¿Te gustaría crear una cuenta y probarla?</strong>
      </p>
    </ion-card-content>
  </ion-card>

  <!-- QR -->
  <div style="text-align:center; margin: 24px 0;">
    <p><strong>Escanea para descargar o probar la app:</strong></p>
    <canvas #qrCanvas style="border-radius:12px;"></canvas>
    <p style="font-size:0.85em; color:var(--ion-color-medium); margin-top:8px;">
      {{ urlDescarga }}
    </p>
  </div>

  <ion-button expand="block" color="primary" (click)="irARegistro()">
    Crear cuenta y probar
  </ion-button>

</ion-content>
