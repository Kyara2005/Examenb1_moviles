<ion-header>
  <ion-toolbar>
    <ion-title>Evidencias ({{ fotos.length }})</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="contenido">

  <ion-refresher slot="fixed" (ionRefresh)="refrescar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Loading -->
  <div class="loading-container" *ngIf="loading">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Cargando evidencias...</p>
  </div>


  <!-- Grid de fotos -->
  <ion-grid *ngIf="!loading">
    <ion-row>
      <ion-col size="12" size-sm="6" size-md="4" size-lg="3" *ngFor="let foto of fotos">
        <ion-card (click)="abrirFoto(foto)" style="cursor:pointer; margin:4px;">
          <img [src]="foto.foto" class="imagen-foto"/>
          
          <ion-card-content style="padding:8px;">
            <p style="margin:0; font-weight:bold; font-size:0.85em;">
              🎮 {{ foto.videojuego }}
            </p>
            <p style="margin:0; font-size:0.75em; color:var(--ion-color-medium);">
              📍 {{ foto.lugar ?? 'Sin lugar' }}
            </p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Sin fotos -->
  <div class="sin-fotos" *ngIf="!loading && fotos.length === 0">
    <ion-icon name="images-outline"></ion-icon>
    <p>No hay evidencias aún.</p>
  </div>

  <!-- Modal foto ampliada -->
  <ion-modal [isOpen]="modalAbierto" (didDismiss)="cerrarModal()">
    <ng-template>
      <ion-header>
        <ion-toolbar class="toolbar-custom">
          <ion-title>{{ fotoSeleccionada?.videojuego }}</ion-title>
          <ion-buttons slot="end">
            <ion-button fill="clear" (click)="cerrarModal()">
              <ion-icon name="close-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding modal-content">
        <img [src]="fotoSeleccionada?.foto" class="modal-img" />
        <div class="info-modal">
          <p>👤 <strong>{{ fotoSeleccionada?.nombre }}</strong></p>
          <p>📍 {{ fotoSeleccionada?.lugar }}</p>
          <p>📅 {{ fotoSeleccionada?.fecha }}</p>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
